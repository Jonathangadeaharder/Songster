services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${PORT:-3001}:3000'
    environment:
      - PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - PUBLIC_SUPABASE_ANON_KEY=${PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-mini}
      - LOCAL_AI_BASE_URL=http://ollama-shared:11434/v1
      - MINI_MODEL=${MINI_MODEL:-phi3:mini}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma2:2b}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - PUBLIC_POSTHOG_HOST=${PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
      - PUBLIC_POSTHOG_PROJECT_TOKEN=${PUBLIC_POSTHOG_PROJECT_TOKEN:-}
      - ORIGIN=${ORIGIN:-http://localhost:3001}
    labels:
      - traefik.enable=true
      - traefik.http.routers.songster.rule=Host(`songster.159.223.26.67.sslip.io`)
      - traefik.http.routers.songster.entrypoints=http
      - traefik.http.services.songster.loadbalancer.server.port=3000
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true
