# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --compatibility up -d
#
# Requires a .env file with all secrets populated (cloud Supabase URL + keys).
# Note: --compatibility flag is required for resource limits to take effect
# outside of Docker Swarm mode.

services:
  app:
    restart: unless-stopped
    ports: [] # Remove exposed ports — only internal network
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-mini}
      - PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - PUBLIC_SUPABASE_ANON_KEY=${PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    networks:
      - songster-internal
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  ollama:
    restart: unless-stopped
    ports: []
    networks:
      - songster-internal
    mem_limit: 1500m
    cpus: 1.5
    volumes:
      - ollama_data:/root/.ollama

networks:
  songster-internal:
    driver: bridge

volumes:
  ollama_data:
    driver: local
