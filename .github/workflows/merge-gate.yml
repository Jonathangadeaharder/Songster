name: Merge Gate

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

defaults:
  run:
    working-directory: songster-svelte

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check for iCloud conflict files
        run: |
          conflicts=$(find . -name ".* 2.*" -not -path "./songster-svelte/static/generated-media/*" | head -50)
          if [ -n "$conflicts" ]; then
            echo "::error::iCloud conflict files detected:"
            echo "$conflicts"
            exit 1
          fi

  node-quality:
    name: Node Quality
    runs-on: self-hosted
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST || 'https://eu.i.posthog.com' }}
      PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ vars.PUBLIC_POSTHOG_PROJECT_TOKEN || 'phc_tW5Q2NAFverQcqPzrhGfBV6sq2DRSiJc9QrpkboxVzTs' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: songster-svelte/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm exec biome check src/

      - name: Typecheck
        run: pnpm check

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: songster-svelte/coverage/

  sonarcloud:
    name: SonarCloud
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectKey: Jonathangadeaharder_Songster
          organization: jonathangadeaharder
          projectBaseDir: .

  dependency-scan:
    name: Dependency Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: songster-svelte
          severity: HIGH,CRITICAL
          exit-code: 1

  secret-scanning:
    name: Secret Scanning
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  e2e-critical:
    name: E2E Critical
    runs-on: self-hosted
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST || 'https://eu.i.posthog.com' }}
      PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ vars.PUBLIC_POSTHOG_PROJECT_TOKEN || 'phc_tW5Q2NAFverQcqPzrhGfBV6sq2DRSiJc9QrpkboxVzTs' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: songster-svelte/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run critical E2E tests
        run: pnpm exec playwright test --grep @critical

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-critical
          path: songster-svelte/playwright-report/
          retention-days: 7

  e2e-matrix:
    name: E2E (${{ matrix.browser }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST || 'https://eu.i.posthog.com' }}
      PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ vars.PUBLIC_POSTHOG_PROJECT_TOKEN || 'phc_tW5Q2NAFverQcqPzrhGfBV6sq2DRSiJc9QrpkboxVzTs' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: songster-svelte/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright ${{ matrix.browser }}
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Build
        run: pnpm build

      - name: Run E2E tests (${{ matrix.browser }})
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: songster-svelte/playwright-report/
          retention-days: 7

  required-checks-merge:
    name: Required Checks (Merge)
    runs-on: self-hosted
    needs:
      - repo-hygiene
      - node-quality
      - sonarcloud
      - dependency-scan
      - secret-scanning
      - codeql
      - e2e-critical
      - e2e-matrix
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.repo-hygiene.result }}" == "failure" ]] || \
             [[ "${{ needs.node-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.sonarcloud.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.secret-scanning.result }}" == "failure" ]] || \
             [[ "${{ needs.codeql.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e-critical.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e-matrix.result }}" == "failure" ]]; then
            echo "::error::One or more required checks failed"
            exit 1
          fi
