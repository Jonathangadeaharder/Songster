name: CI

on:
  push:
    branches: [main, "epic/**", "feat/**", "fix/**", "test/**", "spike/**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: songster-svelte

jobs:
  lint-typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: songster-svelte/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: songster-svelte/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: songster-svelte/coverage/

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: songster-svelte/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: songster-svelte/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg PUBLIC_SUPABASE_URL=${{ secrets.PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }} \
            --build-arg PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }} \
            -t songster-svelte:ci .
        working-directory: songster-svelte

      - name: Verify health endpoint
        run: |
          trap 'docker rm -f songster-test >/dev/null 2>&1 || true' EXIT
          docker run -d --name songster-test \
            -e PUBLIC_SUPABASE_URL=https://placeholder.supabase.co \
            -e PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key \
            -p 3000:3000 \
            songster-svelte:ci
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 1
          done
          docker logs songster-test >&2
          exit 1
        working-directory: songster-svelte
