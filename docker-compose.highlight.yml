version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.12.1.1402
    container_name: highlight-clickhouse
    environment:
      CLICKHOUSE_DB: highlight
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD:
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: highlight-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: highlight-kafka-cluster
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: highlight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15.4
    container_name: highlight-postgres
    environment:
      POSTGRES_USER: highlight
      POSTGRES_PASSWORD: highlight_password
      POSTGRES_DB: highlight
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U highlight"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/highlight/highlight/backend:latest
    container_name: highlight-backend
    environment:
      - CLICKHOUSE_ADDRESS=clickhouse:8123
      - CLICKHOUSE_DATABASE=highlight
      - KAFKA_SERVERS=kafka:9092
      - REDIS_ADDRESS=redis:6379
      - PSQL_DB=highlight
      - PSQL_HOST=postgres
      - PSQL_USER=highlight
      - PSQL_PASSWORD=highlight_password
      - ENVIRONMENT=dev
      - REACT_APP_FRONTEND_URI=http://localhost:3000
      - PRIVATE_GRAPH_URI=http://localhost:8082
    ports:
      - "8082:8082"
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  clickhouse-data:
  kafka-data:
  redis-data:
  postgres-data:
